<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Project Generator</title>
    <script src="projects.js"></script>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <header>
            Programming Project Generator
        </header>
    </div>
    <div class="main-content">
        <h1 id="projectlbl">Click the button below to generate an idea for a programming project!</h1>
        <p id="projectdesc"></p>
        <p id="difficulty"></p>
        <p id="estimatedTime"></p>
        <div class="buttons">
            <button id="generatebtn">Generate</button>
            <button id="resetbtn">Reset</button>
        </div>
    </div>
    
    <div class="footer">
        <footer>
            <div>Made by Drew Kirby</div>
            <a href="http://github.com/Drew-Kirby" target="_blank">
                <img id="footerIMG" src="https://images.icon-icons.com/3685/PNG/512/github_logo_icon_229278.png" alt="GitHub: Drew Kirby">
            </a>
            <a href="https://www.linkedin.com/in/drew-kirby" target="_blank">
                <img id="footerIMG2" src="https://static.vecteezy.com/system/resources/thumbnails/018/930/585/small/linkedin-logo-linkedin-icon-transparent-free-png.png" alt="GitHub: Drew Kirby">
            </a>
        </footer>
    </div>
</body>

</html>
